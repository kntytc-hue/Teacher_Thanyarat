<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kernel Master: Exam Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f19;
            --user-space: #1e293b;
            --kernel-space: #1e1b4b;
            --accent: #0ea5e9;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 2px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .stats-box {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-item {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .mode-badge {
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s;
        }

        .mode-1 { background: linear-gradient(135deg, #38bdf8, #0284c7); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }
        .mode-0 { background: linear-gradient(135deg, #f43f5e, #be123c); box-shadow: 0 0 20px rgba(244, 63, 94, 0.6); }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex-grow: 1;
            gap: 25px;
            padding: 25px;
            height: calc(100vh - 80px);
        }

        .area {
            position: relative;
            border-radius: 16px;
            padding: 50px 25px 25px 25px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
        }

        .space-label {
            position: absolute;
            top: 15px;
            left: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            opacity: 0.6;
        }

        #user-area { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
        #kernel-area { background: linear-gradient(180deg, #1e1b4b 0%, #111033 100%); }

        .process-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .process-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .process-card.selected {
            border-color: var(--warning);
            background: rgba(245, 158, 11, 0.08);
        }

        .syscall-badge {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
        }

        .request-btn {
            background: var(--warning);
            border: none;
            color: #0f172a;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .kernel-control { display: flex; flex-direction: column; gap: 20px; height: 100%; }

        .action-btn {
            padding: 18px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-family: 'Sarabun', sans-serif; font-size: 1.05rem; display: flex; align-items: center; justify-content: center; gap: 10px; color: white;
        }

        .btn-switch { background: linear-gradient(135deg, #38bdf8, #0284c7); }
        .btn-update { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-return { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .action-btn:disabled { opacity: 0.15; cursor: not-allowed; }

        .tasks-group { display: flex; flex-direction: column; gap: 12px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; }

        .pcb-monitor {
            flex-grow: 1; background: #040711; padding: 20px; border-radius: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); display: flex; flex-direction: column;
        }

        #pcb-log { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column-reverse; gap: 8px; }

        /* Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 15, 25, 0.98); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; padding: 40px; text-align: center;
        }

        .result-card { background: #1e293b; padding: 40px; border-radius: 20px; border: 2px solid var(--accent); max-width: 500px; width: 100%; }
        .grade-display { font-size: 5rem; font-weight: 700; color: var(--warning); margin: 20px 0; font-family: 'JetBrains Mono', monospace; }

        .bsod-mode { background: #0000aa !important; color: white !important; }
        .bsod-btn { background: white; color: #0000aa; padding: 12px 30px; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <div class="stats-box">
        <div class="stat-item"><i class="fa-solid fa-star" style="color:var(--warning)"></i> SCORE: <span id="score">0</span></div>
        <div class="stat-item"><i class="fa-solid fa-list-check" style="color:var(--accent)"></i> PROGRESS: <span id="progress">0</span> / 20</div>
        <div class="stat-item"><i class="fa-solid fa-clock" style="color:var(--danger)"></i> TIME: <span id="timer">180</span>s</div>
    </div>
    <div>
        <span id="mode-bit" class="mode-badge mode-1">MODE BIT: 1 (USER)</span>
    </div>
</header>

<main>
    <section id="user-area" class="area">
        <div class="space-label"><i class="fa-solid fa-user"></i> User Space (Mode 1)</div>
        <div id="process-list" class="process-container"></div>
    </section>

    <section id="kernel-area" class="area">
        <div class="space-label"><i class="fa-solid fa-shield-halved"></i> Kernel Space (Mode 0)</div>
        <div class="kernel-control">
            <button id="btn-trap" class="action-btn btn-switch" onclick="handleTrap()" disabled>
                <i class="fa-solid fa-bolt"></i> ISSUE TRAP (สลับโหมด)
            </button>
            
            <div id="kernel-tasks" class="tasks-group" style="opacity: 0.3; pointer-events: none;">
                <button id="btn-update" class="action-btn btn-update" onclick="updatePCB()">
                    <i class="fa-solid fa-database"></i> 1. UPDATE PCB & ACCESS HARDWARE
                </button>
                <button id="btn-return" class="action-btn btn-return" onclick="handleReturn()">
                    <i class="fa-solid fa-arrow-left-long"></i> 2. RETURN TO USER SPACE
                </button>
            </div>

            <div class="pcb-monitor">
                <div id="pcb-log"><div>> OS Booted. 20 Exam Tasks Initialized. Click "เลือกจัดการ" to start!</div></div>
            </div>
        </div>
    </section>
</main>

<div id="overlay">
    <div id="result-content" class="result-card">
        <h2><i class="fa-solid fa-graduation-cap"></i> สรุปผลการทดสอบห้องปฏิบัติการ</h2>
        <p style="margin-top:15px; opacity:0.7;">คุณทำหน้าที่เป็น OS Kernel ในการจัดการระบบ</p>
        <div class="grade-display" id="grade-res">A</div>
        <p style="font-size:1.2rem;">คะแนนที่ได้: <strong id="score-res">0</strong> แต้ม</p>
        <p style="margin-bottom:20px;">จัดการโปรเซสสำเร็จ: <strong id="task-res">0</strong> / 20 ข้อ</p>
        <button onclick="location.reload()" class="action-btn btn-switch" style="width:100%">ลองใหม่อีกครั้ง</button>
    </div>
</div>

<script>
    let score = 0;
    let timeLeft = 180;
    let totalTasksHandled = 0;
    let totalTasksSpawned = 0;
    let maxTasks = 20;
    let currentMode = 1;
    let activeRequest = null;
    let processes = [];
    let gameActive = true;

    const systemCalls = [
        { call: 'write()', desc: 'ขอบันทึกข้อมูลลง Harddisk' },
        { call: 'open()', desc: 'ขอเปิดไฟล์ระบบคลังข้อมูล' },
        { call: 'read()', desc: 'ขออ่านข้อมูลจากไดรฟ์ระบบ' },
        { call: 'fork()', desc: 'ขอแตกโปรเซสลูกตัวใหม่' },
        { call: 'exit()', desc: 'ขอเคลียร์หน่วยความจำเพื่อปิดตัว' }
    ];

    function spawnProcess() {
        if (!gameActive || totalTasksSpawned >= maxTasks || processes.length > 4) return;
        
        totalTasksSpawned++;
        const id = Math.floor(Math.random() * 8990) + 1010;
        const callObj = systemCalls[Math.floor(Math.random() * systemCalls.length)];
        const proc = { id, call: callObj.call, desc: callObj.desc };
        
        processes.push(proc);
        renderProcesses();
        log(`[โจทย์ข้อที่ ${totalTasksSpawned}] โปรเซส PID ${id} ส่ง System Call: <span class="syscall-badge">${proc.call}</span>`);
    }

    function renderProcesses() {
        const list = document.getElementById('process-list');
        list.innerHTML = '';
        processes.forEach(p => {
            const isSelected = activeRequest && activeRequest.id === p.id;
            const card = document.createElement('div');
            card.className = `process-card ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `
                <div>
                    <h4>PID: ${p.id}</h4>
                    <p>${p.desc} (<span class="syscall-badge">${p.call}</span>)</p>
                </div>
                <button class="request-btn" onclick="selectRequest(${p.id})" ${currentMode === 0 ? 'disabled' : ''}>เลือกจัดการ</button>
            `;
            list.appendChild(card);
        });
    }

    function selectRequest(id) {
        if (currentMode === 0) return;
        activeRequest = processes.find(p => p.id === id);
        renderProcesses();
        document.getElementById('btn-trap').disabled = false;
    }

    function handleTrap() {
        if (!activeRequest) return;
        currentMode = 0;
        updateUI();
        log(`[Trap Occurred] เปลี่ยน Mode Bit เป็น 0 ย้ายเข้าสู่ Kernel Space เพื่อประมวลผลงานปลอดภัย`);
        
        const group = document.getElementById('kernel-tasks');
        group.style.opacity = '1'; group.style.pointerEvents = 'auto';
        document.getElementById('btn-trap').disabled = true;
        document.getElementById('btn-update').disabled = false;
        document.getElementById('btn-return').disabled = true;
    }

    function updatePCB() {
        if (currentMode !== 0 || !activeRequest) return;
        score += 20;
        totalTasksHandled++;
        document.getElementById('score').innerText = score;
        document.getElementById('progress').innerText = totalTasksHandled;
        log(`[PCB Saved] ข้อมูลของ PID ${activeRequest.id} อัปเดตสถานะเป็นสำเร็จและเคลียร์ฮาร์ดแวร์แล้ว`);
        
        processes = processes.filter(p => p.id !== activeRequest.id);
        activeRequest.done = true;
        
        document.getElementById('btn-update').disabled = true;
        document.getElementById('btn-return').disabled = false;

        if (totalTasksHandled === maxTasks) {
            endGame();
        }
    }

    function handleReturn() {
        if (!activeRequest || !activeRequest.done) return;
        currentMode = 1;
        activeRequest = null;
        updateUI();
        log(`[Return Status] สลับ Mode Bit กลับเป็น 1 คืนอำนาจประมวลผลให้กับแอปพลิเคชันฝั่งผู้ใช้`);
        
        const group = document.getElementById('kernel-tasks');
        group.style.opacity = '0.3'; group.style.pointerEvents = 'none';
        renderProcesses();
    }

    function updateUI() {
        const badge = document.getElementById('mode-bit');
        if (currentMode === 1) {
            badge.innerText = "MODE BIT: 1 (USER)"; badge.className = "mode-badge mode-1";
        } else {
            badge.innerText = "MODE BIT: 0 (KERNEL)"; badge.className = "mode-badge mode-0";
        }
        renderProcesses();
    }

    function log(msg) {
        const pcbLog = document.getElementById('pcb-log');
        const div = document.createElement('div');
        div.innerHTML = `> ${msg}`;
        pcbLog.appendChild(div);
    }

    const gameTimer = setInterval(() => {
        if (!gameActive) return;
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft;
        if (timeLeft <= 0) { endGame(); }
    }, 1000);

    const spawner = setInterval(() => {
        if (processes.length > 4 && gameActive) {
            clearInterval(gameTimer);
            clearInterval(spawner);
            gameActive = false;
            triggerBSOD();
            return;
        }
        if (totalTasksSpawned < maxTasks) { spawnProcess(); }
    }, 2500);

    function triggerBSOD() {
        const overlay = document.getElementById('overlay');
        overlay.innerHTML = `
            <div style="text-align:left; font-family:'JetBrains Mono'; max-width:800px; color:white;">
                <h1 style="background:white; color:#0000aa; padding:5px 10px; display:inline-block; margin-bottom:20px;">SYSTEM_CRASH_DUE_TO_OVERLOAD</h1>
                <p>เกิดข้อผิดพลาดร้ายแรง: คุณสะสมโปรเซสฝั่ง User Space เกินข้อจำกัดระบบ (ค้างเกิน 4 งานพร้อมกัน)</p>
                <p>ทำให้ข้อมูลขอบเขตเวชระเบียน PCB เกิดการชนกันในหน่วยความจำหลังบ้าน (Kernel Stack Overflow)</p>
                <p>ผลการประเมินวิชา OS ครั้งนี้: <strong style="color:var(--danger); font-size:2rem;">GRADE: F</strong></p>
                <button class="bsod-btn" onclick="location.reload()">REBOOT & RE-EXAM</button>
            </div>
        `;
        overlay.className = "bsod-mode";
        overlay.style.display = "flex";
    }

    function endGame() {
        gameActive = false;
        clearInterval(gameTimer);
        clearInterval(spawner);
        let grade = "F";
        if (totalTasksHandled >= 18) grade = "A";
        else if (totalTasksHandled >= 15) grade = "B";
        else if (totalTasksHandled >= 11) grade = "C";
        else if (totalTasksHandled >= 8) grade = "D";
        document.getElementById('grade-res').innerText = grade;
        document.getElementById('score-res').innerText = score;
        document.getElementById('task-res').innerText = totalTasksHandled;
        document.getElementById('overlay').style.display = "flex";
    }
</script>
</body>
</html>
