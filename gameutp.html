<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTP Color Sorting Game (T568B)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-blue: #38bdf8;
            --neon-green: #4ade80;
            --neon-pink: #f43f5e;
            --neon-orange: #fb923c;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), inset 0 1px 2px rgba(255,255,255,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 5px;
            background: linear-gradient(to right, #38bdf8, #a855f7, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(168,85,247,0.2);
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.05rem;
            margin-bottom: 35px;
        }

        /* คลังลูกแก้วสี */
        .color-pool {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 40px;
            padding: 25px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 20px;
            border: 2px dashed rgba(56, 189, 248, 0.3);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.2);
            min-height: 70px;
            align-items: center;
        }

        /* แท่น RJ-45 สไตล์ Sci-Fi แก้วใส */
        .rj45-connector {
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 35px 20px 20px 20px;
            display: flex;
            justify-content: space-between;
            position: relative;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.15), inset 0 0 15px rgba(56, 189, 248, 0.1);
            margin: 0 auto 35px auto;
            gap: 10px;
        }

        .rj45-connector::before {
            content: "RJ-45 CONNECTOR (นับจากซ้ายไปขวา ขาที่ 1-8)";
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--neon-blue);
            font-weight: 600;
            opacity: 0.8;
        }

        /* ช่องว่างใส่หลอดสี */
        .slot {
            flex: 1;
            height: 140px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            position: relative;
            transition: all 0.3s;
            padding-bottom: 8px;
        }
        .slot-number {
            position: absolute;
            top: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
        }

        /* ดีไซน์ตัวสาย/ลูกแก้วสี (3D Gradient + Glow) */
        .wire {
            width: 44px;
            height: 90px;
            border-radius: 22px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.2;
            text-align: center;
            color: #ffffff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3), inset 0 4px 6px rgba(255,255,255,0.4), inset 0 -4px 6px rgba(0,0,0,0.2);
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .wire:hover {
            transform: scale(1.05);
        }
        .wire.dragging { opacity: 0.4; }

        /* คลาสสีกราเดียนท์จำลองเหมือนรูปภาพ */
        .w-orange-white { background: linear-gradient(180deg, #ff9800 0%, #ffffff 50%, #ff9800 100%); color: #000; text-shadow: none; }
        .w-orange       { background: linear-gradient(180deg, #f97316 0%, #ea580c 100%); }
        .w-green-white  { background: linear-gradient(180deg, #4caf50 0%, #ffffff 50%, #4caf50 100%); color: #000; text-shadow: none; }
        .w-blue         { background: linear-gradient(180deg, #3b82f6 0%, #1d4ed8 100%); }
        .w-blue-white   { background: linear-gradient(180deg, #2196f3 0%, #ffffff 50%, #2196f3 100%); color: #000; text-shadow: none; }
        .w-green        { background: linear-gradient(180deg, #22c55e 0%, #15803d 100%); }
        .w-brown-white  { background: linear-gradient(180deg, #a16207 0%, #ffffff 50%, #a16207 100%); color: #000; text-shadow: none; }
        .w-brown        { background: linear-gradient(180deg, #78350f 0%, #451a03 100%); }

        /* ตรวจสอบผลลัพธ์ */
        .slot.correct { border: 2px solid var(--neon-green); box-shadow: 0 0 15px rgba(74, 222, 128, 0.2); }
        .slot.wrong { border: 2px solid var(--neon-pink); box-shadow: 0 0 15px rgba(244, 63, 94, 0.2); }
        .slot.correct .slot-number { color: var(--neon-green); }
        .slot.wrong .slot-number { color: var(--neon-pink); }
        
        /* สรุปคะแนนการเล่น */
        .result-box {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .score-num {
            font-size: 3rem;
            font-weight: 600;
            margin: 10px 0;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ปุ่มกดดีไซน์สุดล้ำ */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }
        .btn {
            font-family: 'Kanit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-check {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
        }
        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
        }
        .btn-reset {
            background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%);
            color: white;
            box-shadow: 0 0 20px rgba(234, 88, 12, 0.3);
        }
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(234, 88, 12, 0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>เกมส์เรียงสีสาย UTP (มาตรฐาน T568B)</h1>
    <p class="subtitle">คลิกที่สี หรือ ลากหลอดสีลงไปวางในตัวล็อกหัว RJ-45 ด้านล่างให้ถูกต้องตามมาตรฐาน</p>

    <div class="color-pool" id="color-pool"></div>

    <div class="rj45-connector">
        <div class="slot" data-index="0"><span class="slot-number">1</span></div>
        <div class="slot" data-index="1"><span class="slot-number">2</span></div>
        <div class="slot" data-index="2"><span class="slot-number">3</span></div>
        <div class="slot" data-index="3"><span class="slot-number">4</span></div>
        <div class="slot" data-index="4"><span class="slot-number">5</span></div>
        <div class="slot" data-index="5"><span class="slot-number">6</span></div>
        <div class="slot" data-index="6"><span class="slot-number">7</span></div>
        <div class="slot" data-index="7"><span class="slot-number">8</span></div>
    </div>

    <div class="btn-group">
        <button class="btn btn-check" onclick="checkAnswers()">ตรวจคำตอบ</button>
        <button class="btn btn-reset" onclick="initGame()">เริ่มใหม่ / สลับสี</button>
    </div>

    <div class="result-box" id="result-box">
        <div class="score-num" id="score-text">0 / 10</div>
        <p id="feedback-text" style="font-size: 1.1rem; line-height: 1.6;"></p>
    </div>
</div>

<script>
    // ข้อมูลเฉลยสีสายสัญญาณตามมาตรฐาน T568B
    const correctOrder = [
        { id: "ow", name: "ขาว<br>ส้ม", class: "w-orange-white" },
        { id: "o",  name: "ส้ม",     class: "w-orange" },
        { id: "gw", name: "ขาว<br>เขียว",class: "w-green-white" },
        { id: "b",  name: "น้ำเงิน",   class: "w-blue" },
        { id: "bw", name: "ขาว<br>น้ำเงิน",class: "w-blue-white" },
        { id: "g",  name: "เขียว",    class: "w-green" },
        { id: "brw",name: "ขาว<br>น้ำตาล",class: "w-brown-white" },
        { id: "br", name: "น้ำตาล",   class: "w-brown" }
    ];

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function initGame() {
        const pool = document.getElementById('color-pool');
        pool.innerHTML = '';
        
        document.querySelectorAll('.slot').forEach(slot => {
            slot.className = "slot";
            const wire = slot.querySelector('.wire');
            if(wire) wire.remove();
        });

        document.getElementById('result-box').style.display = 'none';

        const shuffledWires = shuffle([...correctOrder]);
        
        shuffledWires.forEach(wireData => {
            const wireEl = document.createElement('div');
            wireEl.className = `wire ${wireData.class}`;
            wireEl.innerHTML = wireData.name;
            wireEl.id = wireData.id;
            wireEl.draggable = true;
            
            // ตั้งค่า Drag and Drop
            wireEl.addEventListener('dragstart', () => wireEl.classList.add('dragging'));
            wireEl.addEventListener('dragend', () => wireEl.classList.remove('dragging'));
            
            // รองรับคลิกเลือกเพื่อย้าย (อำนวยความสะดวกสมาร์ตโฟน)
            wireEl.addEventListener('click', () => {
                const emptySlot = document.querySelector('.slot:not(:has(.wire))');
                if (emptySlot && wireEl.parentElement.id === 'color-pool') {
                    emptySlot.appendChild(wireEl);
                } else if (wireEl.parentElement.classList.contains('slot')) {
                    pool.appendChild(wireEl);
                }
            });

            pool.appendChild(wireEl);
        });
    }

    const pool = document.getElementById('color-pool');
    [pool, ...document.querySelectorAll('.slot')].forEach(zone => {
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', e => {
            e.preventDefault();
            const draggingWire = document.querySelector('.dragging');
            if(!draggingWire) return;

            if (zone.classList.contains('slot')) {
                const existingWire = zone.querySelector('.wire');
                if(existingWire) pool.appendChild(existingWire);
                zone.appendChild(draggingWire);
            } else {
                zone.appendChild(draggingWire);
            }
        });
    });

    // ฟังก์ชันคำนวณเกณฑ์คะแนนเต็ม 10 และไฮไลต์จุดผิดสีแดงสว่าง
    function checkAnswers() {
        let correctCount = 0;
        let unanswered = false;
        const slots = document.querySelectorAll('.slot');
        
        slots.forEach(slot => {
            if(!slot.querySelector('.wire')) unanswered = true;
        });

        if(unanswered) {
            alert("โปรดจัดตำแหน่งสีสายสัญญาณให้ครบถ้วนทั้ง 8 ช่องก่อนทำการส่งตรวจคำตอบครับ!");
            return;
        }

        slots.forEach((slot, index) => {
            const wire = slot.querySelector('.wire');
            if (wire && wire.id === correctOrder[index].id) {
                slot.className = "slot correct";
                correctCount++;
            } else {
                slot.className = "slot wrong";
            }
        });

        // สูตรการแปลงค่าคะแนน 8 ช่อง เป็นเกณฑ์ 10 คะแนนเต็ม
        let finalScore = ((correctCount * 10) / 8).toFixed(1);
        if(finalScore.endsWith('.0')) finalScore = parseInt(finalScore);

        const resultBox = document.getElementById('result-box');
        const scoreText = document.getElementById('score-text');
        const feedbackText = document.getElementById('feedback-text');
        
        resultBox.style.display = 'block';
        scoreText.innerText = `คะแนนของคุณ: ${finalScore} / 10 คะแนน`;

        if (correctCount === 8) {
            resultBox.style.background = 'rgba(22, 163, 74, 0.2)';
            resultBox.style.borderColor = 'var(--neon-green)';
            feedbackText.innerHTML = "<span style='color: #4ade80; font-weight: bold;'>🎉 ยอดเยี่ยมมาก! เก่งที่สุด!</span><br>คุณทำการเชื่อมต่อชุดสีสาย LAN สำเร็จ ถูกต้องครบถ้วนไร้ข้อผิดพลาด";
        } else {
            resultBox.style.background = 'rgba(220, 38, 38, 0.15)';
            resultBox.style.borderColor = 'var(--neon-pink)';
            
            let wrongPositions = [];
            slots.forEach((slot, index) => {
                if(slot.classList.contains('wrong')) wrongPositions.push(index + 1);
            });
            
            feedbackText.innerHTML = `<span style='color: #f43f5e; font-weight: bold;'>❌ พบข้อผิดพลาดที่ช่องหมายเลข: ${wrongPositions.join(', ')}</span><br><br>` +
                                    `💡 <u>ทบทวนความรู้โค้ดสีมาตรฐาน T568B:</u><br>` +
                                    `<small>1. ขาว/ส้ม | 2. ส้ม | 3. ขาว/เขียว | 4. น้ำเงิน | 5. ขาว/น้ำเงิน | 6. เขียว | 7. ขาว/น้ำตาล | 8. น้ำตาล</small>`;
        }
    }

    // เริ่มโหลดระบบเกม
    initGame();
</script>

</body>
</html>
