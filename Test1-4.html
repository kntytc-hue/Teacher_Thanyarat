<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบทดสอบ OS: ระบบคอมพิวเตอร์และระบบปฏิบัติการ (40 ข้อ)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 30px 10px;
        }
        .container { max-width: 850px; margin: 0 auto; }
        
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #1d4ed8 100%);
            color: white;
            padding: 40px 20px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Student Info Card */
        .info-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .info-card h3 { margin-bottom: 20px; color: var(--primary); font-size: 1.2rem; }
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-weight: 600; font-size: 0.9rem; color: #64748b; }
        .input-group input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .question-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .question-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 18px; color: #1e293b; }
        .options-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .option-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-item:hover { background-color: #f8fafc; border-color: #94a3b8; }
        .option-item input { margin-right: 15px; transform: scale(1.3); cursor: pointer; }
        
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 12px;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.3);
            transition: 0.2s;
        }
        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Result Section */
        .result-box {
            display: none;
            background: white;
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--primary);
            margin-bottom: 30px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .result-score { font-size: 4rem; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .student-summary { font-size: 1.2rem; font-weight: 600; color: #475569; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 10px; }

        .correct-match { background-color: #d1fae5 !important; border-color: #34d399 !important; color: #065f46; font-weight: 600; }
        .wrong-match { background-color: #fee2e2 !important; border-color: #f87171 !important; color: #991b1b; }
        .explanation {
            margin-top: 15px;
            padding: 15px;
            background-color: #f8fafc;
            border-left: 5px solid var(--secondary);
            font-size: 0.95rem;
            display: none;
            border-radius: 0 8px 8px 0;
        }

        @media (max-width: 600px) {
            .grid-inputs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-microchip"></i> แบบทดสอบวัดความรู้ระบบปฏิบัติการ</h1>
        <p>บทเรียน: OS Components, Architecture, System Calls, and Process Management</p>
    </header>

    <div id="result" class="result-box">
        <h2 style="color: var(--primary);"><i class="fa-solid fa-chart-line"></i> สรุปผลคะแนนการสอบ</h2>
        <div class="student-summary" id="student-res">
            ชื่อ-นามสกุล: - | ชั้น: - | เลขที่: -
        </div>
        <div class="result-score"><span id="score-val">0</span> / 40</div>
        <p id="result-comment" style="font-size: 1.1rem; font-weight: 600;"></p>
        <p style="margin-top: 15px; color: #94a3b8; font-size: 0.85rem;">อาจารย์สามารถให้นักเรียนแคปหน้าจอนี้เพื่อเป็นหลักฐานการส่งงาน</p>
    </div>

    <div class="info-card">
        <h3><i class="fa-solid fa-user-graduate"></i> ข้อมูลผู้เข้าสอบ</h3>
        <div class="grid-inputs">
            <div class="input-group">
                <label>ชื่อ (First Name)</label>
                <input type="text" id="fname" placeholder="กรุณากรอกชื่อ" required>
            </div>
            <div class="input-group">
                <label>นามสกุล (Last Name)</label>
                <input type="text" id="lname" placeholder="กรุณากรอกนามสกุล" required>
            </div>
            <div class="input-group">
                <label>ชั้น / ห้อง (Class)</label>
                <input type="text" id="sclass" placeholder="เช่น ปวส.1/1" required>
            </div>
            <div class="input-group">
                <label>เลขที่ (Student No.)</label>
                <input type="number" id="sno" placeholder="กรุณากรอกเลขที่" required>
            </div>
        </div>
    </div>

    <form id="quizForm" class="quiz-form" onsubmit="event.preventDefault(); evaluateQuiz();">
        <div id="questions-container"></div>
        <button type="submit" class="btn-submit">
            <i class="fa-solid fa-paper-plane"></i> ส่งคำตอบและตรวจคะแนน
        </button>
    </form>
</div>

<script>
    const questionsData = [
        {
            q: "1. องค์ประกอบใดของระบบคอมพิวเตอร์ทำหน้าที่ประสานงานและควบคุมการทำงานของฮาร์ดแวร์ทั้งหมด?",
            o: ["หน่วยประมวลผลกลาง (CPU)", "หน่วยความจำหลัก (RAM)", "ระบบปฏิบัติการ (OS)", "บัสระบบ (System Bus)"],
            a: 2,
            e: "ระบบปฏิบัติการ (OS) ทำหน้าที่เป็นตัวกลางในการควบคุม จัดสรร และประสานงานระหว่างฮาร์ดแวร์กับซอฟต์แวร์แอปพลิเคชัน"
        },
        {
            q: "2. อุปกรณ์ใดจัดอยู่ในกลุ่ม หน่วยเก็บข้อมูลสำรอง (Secondary Storage) ที่เข้าถึงข้อมูลได้ช้าแต่ความจุสูง?",
            o: ["Solid State Drive (SSD)", "Register", "Cache Memory", "RAM"],
            a: 0,
            e: "SSD เป็นหน่วยเก็บข้อมูลสำรองถาวร ในขณะที่ Register, Cache, และ RAM เป็นหน่วยความจำความเร็วสูงฝั่งหน่วยประมวลผล/ระบบทำงานชั่วคราว"
        },
        {
            q: "3. สิ่งใดทำหน้าที่เปรียบเสมือนถนนเชื่อมต่อในการรับส่งข้อมูลระหว่าง CPU, หน่วยความจำ และอุปกรณ์ I/O?",
            o: ["Control Unit", "System Bus", "ALU", "Operating System"],
            a: 1,
            e: "System Bus (บัสระบบ) คือวงจรทางเดินไฟฟ้าที่ใช้สำหรับส่งผ่านข้อมูล สัญญาณควบคุม และแอดเดรสภายในระบบคอมพิวเตอร์"
        },
        {
            q: "4. หน่วยความจำประเภทใดสูญหายข้อมูลทันทีเมื่อไม่มีกระแสไฟฟ้าหล่อเลี้ยง (Volatile Memory)?",
            o: ["ROM", "Flash Drive", "RAM", "Harddisk"],
            a: 2,
            e: "RAM เป็นหน่วยความจำชั่วคราว ข้อมูลจะเลือนหายไปทั้งหมดเมื่อปิดเครื่องคอมพิวเตอร์หรือไฟฟ้าดับ"
        },
        {
            q: "5. ส่วนประกอบใดภายใน CPU ที่ทำหน้าที่คำนวณทางคณิตศาสตร์และเปรียบเทียบตรรกศาสตร์?",
            o: ["ALU", "Control Unit", "Registers", "Cache"],
            a: 0,
            e: "ALU (Arithmetic Logic Unit) ทำหน้าที่ประมวลผลการคำนวณและเปรียบเทียบเงื่อนไขทางตรรกะ"
        },
        {
            q: "6. ข้อใดเป็นหน้าที่เชิงลึกด้าน Memory Management ของระบบปฏิบัติการ?",
            o: ["การตรวจสอบสิทธิ์รหัสผ่านของผู้ใช้", "การติดตามส่วนของแรมที่ถูกใช้งานและจัดสรรให้โปรเซส", "การจัดระเบียบโครงสร้างไดเรกทอรีในดิฟว์", "การสแกนไวรัสในไฟล์ระบบ"],
            a: 1,
            e: "การจัดการหน่วยความจำเกี่ยวข้องโดยตรงกับการจัดสรร ตรวจสอบ และทวงคืนพื้นที่บน RAM ให้แก่โปรเซสที่รันอยู่"
        },
        {
            q: "7. กลไก Virtual Memory ของ OS มีวัตถุประสงค์หลักเพื่ออะไร?",
            o: ["ทำให้ดาวน์โหลดไฟล์จากอินเทอร์เน็ตได้เร็วขึ้น", "จำลองฮาร์ดดิสก์บางส่วนให้ทำงานเสมือนขยายความจุ RAM", "เพิ่มความเร็วในการประมวลผลของ CPU", "สำรองข้อมูลระบบเพื่อป้องกันแฮกเกอร์"],
            a: 1,
            e: "Virtual Memory ช่วยให้คอมพิวเตอร์สามารถรันโปรแกรมที่มีขนาดใหญ่กว่า RAM จริงได้ โดยอาศัยพื้นที่บางส่วนบน Harddisk/SSD มาช่วยเสริมทำงาน"
        },
        {
            q: "8. การทำ File System Management ของ OS ข้อใดอธิบายถูกต้องที่สุด?",
            o: ["ควบคุมความเร็วของพัดลมระบายอากาศฮาร์ดดิสก์", "จัดโครงสร้าง แบ่งสิทธิ์ และสร้างรูปแบบเชิงตรรกะในการบันทึกข้อมูล (เช่น NTFS, FAT32)", "ลบไฟล์ขยะในระบบปฏิบัติการทิ้งอัตโนมัติ", "แปลงไฟล์รูปภาพให้เป็นไฟล์ข้อความ"],
            a: 1,
            e: "OS จัดสรรโครงสร้าง logical ในการเก็บข้อมูลลงในสื่อบันทึกข้อมูลถาวรผ่านระบบไฟล์ (File System)"
        },
        {
            q: "9. เมื่อระบบปฏิบัติการทำหน้าที่เป็น Resource Allocator หมายถึงสิ่งใด?",
            o: ["การดาวน์โหลดไดรเวอร์ใหม่มาติดตั้ง", "การจัดการแบ่งสิทธิ์การใช้ CPU, RAM และอุปกรณ์ I/O ให้กับแอปพลิเคชันอย่างยุติธรรม", "การจัดจำหน่ายซอฟต์แวร์ลิขสิทธิ์", "การแชร์หน้าจอให้ผู้ใช้คนอื่น"],
            a: 1,
            e: "Resource Allocator คือหน้าที่ในการจัดสรรทรัพยากรที่มีจำกัดของคอมพิวเตอร์ให้แก่โปรแกรมต่างๆ รันได้โดยไม่เกิดข้อพิพาทขัดแย้งกัน"
        },
        {
            q: "10. ข้อใดอธิบายคำว่า 'I/O Device Management' ในบทบาทของระบบปฏิบัติการได้ชัดเจนที่สุด?",
            o: ["การเขียนโค้ดภาษาซีสำหรับแสดงผล", "การใช้ตัวครอบกลางอย่าง Device Drivers เพื่อให้อุปกรณ์ต่างค่ายคุยกับ OS รู้เรื่อง", "การปรับความสว่างหน้าจอคอมพิวเตอร์ด้วยตนเอง", "การถอดปลั๊กเครื่องพิมพ์ออกจากคอมพิวเตอร์"],
            a: 1,
            e: "OS ใช้ Device Drivers เป็นล่ามกลางทำให้อุปกรณ์ Input/Output ยี่ห้อต่างๆ สามารถทำงานร่วมกับระบบแกนกลางได้โดยไม่มีปัญหา"
        },
        {
            q: "11. โครงสร้างสถาปัตยกรรม OS แบบ Monolithic Kernel มีลักษณะเด่นอย่างไร?",
            o: ["แยกส่วนการทำงานทุกอย่างออกจากกันเป็นโมดูลย่อยใน User Space", "รวมบริการหลักทั้งหมดของ OS (เช่น File System, Drivers) ไว้ใน Kernel Space ผืนเดียวกัน", "ทำงานช้ามากเนื่องจากส่งข้อความคุยกันข้ามโหมดบ่อย", "ไม่สามารถปรับเปลี่ยนหรือคอมไพล์โค้ดใหม่ได้"],
            a: 1,
            e: "Monolithic Kernel มีจุดเด่นด้านความเร็วในการทำงานสูงเพราะทุกบริการรันอยู่ในพื้นที่ Kernel Space เดียวกัน แต่หากมีจุดใดเกิด Error ระบบอาจล่มทั้งหมด"
        },
        {
            q: "12. ข้อใดคือข้อเสียหลักของสถาปัตยกรรมแบบ Microkernel?",
            o: ["ถ้าระบบตรวจพบจุดผิดพลาดเพียงจุดเดียวจะทำให้เครื่องดับทันที", "มีประสิทธิภาพความเร็วลดลงเนื่องจากมีภาระงาน (Overhead) ในการส่งข้อมูลสื่อสารข้ามโหมด (IPC) สูง", "ไม่ปลอดภัยเนื่องจากรันไดรเวอร์ในระดับสูงสุด", "ขนาดไฟล์ของระบบปฏิบัติการใหญ่เกินไป"],
            a: 1,
            e: "Microkernel ดึงบริการที่ไม่จำเป็นออกจาก Kernel Space ไปไว้ใน User Space แม้จะปลอดภัยและแก้ไขง่าย แต่การสื่อสารข้ามไปมาส่งผลให้ประสิทธิภาพช้าลง"
        },
        {
            q: "13. ระบบปฏิบัติการสมัยใหม่าง Windows (Hybrid Kernel) ได้รับอิทธิพลจากสถาปัตยกรรมใดผสมผสานกัน?",
            o: ["Monolithic + Microkernel", "Layered + Command Line", "Batch System + Time Sharing", "Distributed + Network Architecture"],
            a: 0,
            e: "Hybrid Kernel นำข้อดีเรื่องความเร็วของ Monolithic มารวมกับข้อดีเรื่องความยืดหยุ่นและโครงสร้างโมดูลของ Microkernel"
        },
        {
            q: "14. โครงสร้างแบบ Layered Approach มีการจัดการบริการของระบบปฏิบัติการอย่างไร?",
            o: ["รวมบริการทั้งหมดไว้จุดเดียวโดยไม่มีการแบ่งระดับ", "แบ่งฟังก์ชันการทำงานเป็นชั้นๆ (Layers) โดยชั้นล่างสุดคือฮาร์ดแวร์ และชั้นบนสุดคืออินเทอร์เฟซผู้ใช้", "ใช้ระบบเครือข่ายในการประมวลผลข้อมูล", "สุ่มตำแหน่งการเก็บข้อมูลลงในหน่วยความจำชั่วคราว"],
            a: 1,
            e: "Layered Approach จะจัดฟังก์ชันเป็นชั้นๆ โดย Layer n จะสามารถเรียกใช้บริการจาก Layer n-1 ได้เท่านั้น"
        },
        {
            q: "15. ในโครงสร้างสถาปัตยกรรม OS หน้าที่ของระบบย่อยที่อยู่บน Kernel Space คืออะไร?",
            o: ["วาดรูปหน้าต่างอินเทอร์เฟซโปรแกรมให้สวยงาม", "ทำงานด้วยสิทธิ์สูงสุดของ CPU เพื่อเข้าถึงสถาปัตยกรรมและฮาร์ดแวร์โดยตรง", "เล่นเกมออนไลน์และจัดสรรแบนด์วิดท์", "แปลงโค้ด HTML ให้แสดงผลบนหน้าจอ"],

    function renderQuiz() {
        const container = document.getElementById('questions-container');
        questionsData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            let optionsHTML = '';
            item.o.forEach((opt, oIndex) => {
                optionsHTML += `
                    <li>
                        <label class="option-item" id="q${index}_o${oIndex}">
                            <input type="radio" name="question${index}" value="${oIndex}" required>
                            <span>${opt}</span>
                        </label>
                    </li>
                `;
            });

            card.innerHTML = `
                <div class="question-title">${item.q}</div>
                <ul class="options-list">${optionsHTML}</ul>
                <div class="explanation" id="exp_${index}"><strong><i class="fa-solid fa-lightbulb"></i> เฉลย:</strong> ${item.e}</div>
            `;
            container.appendChild(card);
        });
    }

    function evaluateQuiz() {
        const fname = document.getElementById('fname').value.trim();
        const lname = document.getElementById('lname').value.trim();
        const sclass = document.getElementById('sclass').value.trim();
        const sno = document.getElementById('sno').value.trim();

        if(!fname || !lname || !sclass || !sno) {
            alert("กรุณากรอกข้อมูลผู้เข้าสอบให้ครบถ้วนก่อนส่งคำตอบครับเพื่อนรัก!");
            return;
        }

        let score = 0;
        questionsData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="question${index}"]:checked`);
            const expDiv = document.getElementById(`exp_${index}`);
            
            expDiv.style.display = 'block';

            item.o.forEach((_, oIndex) => {
                document.getElementById(`q${index}_o${oIndex}`).classList.remove('correct-match', 'wrong-match');
            });

            document.getElementById(`q${index}_o${item.a}`).classList.add('correct-match');

            if (selected) {
                const userAns = parseInt(selected.value);
                if (userAns === item.a) {
                    score++;
                } else {
                    document.getElementById(`q${index}_o${userAns}`).classList.add('wrong-match');
                }
            }
        });

        const resultBox = document.getElementById('result');
        resultBox.style.display = 'block';
        document.getElementById('score-val').innerText = score;
        document.getElementById('student-res').innerHTML = `<strong>ผู้เข้าสอบ:</strong> ${fname} ${lname} | <strong>ชั้น:</strong> ${sclass} | <strong>เลขที่:</strong> ${sno}`;
        
        let comment = "";
        if (score >= 36) comment = "🥇 ยอดเยี่ยมที่สุด! คุณคือ Kernel Master ตัวจริง!";
        else if (score >= 30) comment = "🥈 เก่งมาก! พื้นฐาน OS ของคุณแน่นปึ๊ก!";
        else if (score >= 20) comment = "🥉 ผ่านเกณฑ์! ลองอ่านทบทวนจุดที่ผิดเพื่อความเป๊ะนะ";
        else comment = "❌ ยังไม่ผ่าน! ไม่เป็นไรนะเพื่อนรัก ทบทวนใหม่แล้วลองสู้ดูอีกครั้ง!";
        
        document.getElementById('result-comment').innerText = comment;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.onload = renderQuiz;
</script>
